<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Get My Details</title>
    <style>
        body   { font-family: Arial, sans-serif; max-width: 400px; margin: 60px auto; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 6px; }
        table  { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th     { background: #f0f0f0; }
    </style>
</head>
<body>

    <h1>Get My Details</h1>

    <!-- Plain HTML form — no JavaScript needed -->
    <form action="/my-details" method="GET">
        <button type="submit">Get My Details</button>
    </form>

</body>
</html>
