<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather App</title>
    <style>
        body   { font-family: Arial, sans-serif; max-width: 400px; margin: 60px auto; text-align: center; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #2196F3; color: white; border: none; border-radius: 6px; }
    </style>
</head>
<body>

    <h1>Weather App</h1>
    <p>Click the button to get live weather for Chennai</p>

    <form action="/weather" method="GET">
        <button type="submit">Get Weather</button>
    </form>

</body>
</html>
