<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Save to SQLite</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 60px auto; }
        input { display: block; width: 100%; padding: 10px; margin: 10px 0; font-size: 15px; box-sizing: border-box; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #2196F3; color: white; border: none; border-radius: 6px; }
        #response { margin-top: 20px; font-size: 16px; color: green; }
    </style>
</head>
<body>
    <h1>Save My Details</h1>
    <input type="text"  id="name"  placeholder="Your Name" />
    <input type="email" id="email" placeholder="Your Email" />
    <input type="text"  id="city"  placeholder="Your City" />
    <button onclick="sendDetails()">Save</button>
    <div id="response"></div>

    <script>
        function sendDetails() {
            const payload = {
                name:  document.getElementById('name').value,
                email: document.getElementById('email').value,
                city:  document.getElementById('city').value
            };

            fetch('/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('response').innerText = `${data.message} (Total saved: ${data.total})`;
            });
        }
    </script>
</body>
</html>
